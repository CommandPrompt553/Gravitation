name: Build Rootless Tweak

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot perl build-essential libostree-dev clang rsync

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Download iOS 16.5 SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz -o $HOME/theos/sdks/iPhoneOS16.5.sdk.tar.xz
          tar -xf $HOME/theos/sdks/iPhoneOS16.5.sdk.tar.xz -C $HOME/theos/sdks/
          rm $HOME/theos/sdks/iPhoneOS16.5.sdk.tar.xz

      - name: Build Package
        run: |
          make package FINALPACKAGE=1
